<nav>
  <a routerLink="/">Fragmentos</a>
  
  <div>
    <a routerLink="/sobre">Sobre</a>
    
    @if (utilizadorAutenticado) {
      <a routerLink="/submeter">Submeter</a>
      <a routerLink="/perfil">Perfil</a>
      <button (click)="logout()">Sair</button>
    } @else {
      <button (click)="mostrarModal = true">Entrar</button>
    }
  </div>
</nav>

@if (mostrarModal) {
  <app-auth-modal 
    (fechar)="mostrarModal = false"
    (autenticado)="utilizadorAutenticado = true"
  />
}
